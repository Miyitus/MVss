<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=DotGothic16&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --pc98-black: #000000;
  --pc98-darkblue: #0000aa;
  --pc98-blue: #0055aa;
  --pc98-cyan: #00aaaa;
  --pc98-magenta: #aa00aa;
  --pc98-red: #aa0000;
  --pc98-green: #00aa00;
  --pc98-yellow: #aaaa00;
  --pc98-white: #aaaaaa;
  --pc98-bright-white: #ffffff;
  --pc98-bright-cyan: #55ffff;
  --pc98-bright-magenta: #ff55ff;
  --pc98-bright-red: #ff5555;
  --pc98-bright-green: #55ff55;
  --pc98-bright-yellow: #ffff55;
  --pc98-bright-blue: #5555ff;
  --pc98-orange: #cc6600;
  --pc98-skin: #ffaa88;
  --pc98-pink: #ff88aa;
  --pc98-hair-blue: #5599ff;
}

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #000;
  font-family: 'Press Start 2P', 'DotGothic16', monospace;
  image-rendering: pixelated;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
  -webkit-user-select: none;
  user-select: none;
}

#game-container {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  background: var(--pc98-black);
  position: relative;
  overflow: hidden;
}

/* CRT scanline effect */
#game-container::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.15) 2px,
    rgba(0,0,0,0.15) 4px
  );
  pointer-events: none;
  z-index: 100;
}

/* TITLE SCREEN */
#title-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  background: linear-gradient(180deg, #000022 0%, #000066 40%, #220044 100%);
  position: relative;
}

.title-stars {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  overflow: hidden;
}

.star {
  position: absolute;
  background: var(--pc98-bright-white);
  width: 2px;
  height: 2px;
  animation: twinkle 2s infinite alternate;
}

@keyframes twinkle {
  0% { opacity: 0.2; }
  100% { opacity: 1; }
}

.title-logo {
  position: relative;
  z-index: 10;
  text-align: center;
  margin-bottom: 10px;
}

.title-jp {
  font-family: 'DotGothic16', monospace;
  font-size: clamp(10px, 2.5vw, 14px);
  color: var(--pc98-bright-cyan);
  letter-spacing: 6px;
  margin-bottom: 4px;
}

.title-main {
  font-family: 'Press Start 2P', monospace;
  font-size: clamp(24px, 7vw, 48px);
  color: var(--pc98-bright-magenta);
  text-shadow:
    3px 3px 0 var(--pc98-darkblue),
    -1px -1px 0 var(--pc98-bright-cyan),
    0 0 20px rgba(255,85,255,0.5);
  letter-spacing: 4px;
}

.title-sub {
  font-size: clamp(8px, 2vw, 12px);
  color: var(--pc98-bright-yellow);
  margin-top: 8px;
  letter-spacing: 3px;
}

.title-character {
  position: relative;
  z-index: 10;
  margin: 15px 0;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* CSS pixel art character */
.pixel-miyo {
  width: 80px;
  height: 100px;
  position: relative;
  image-rendering: pixelated;
}

.title-desc {
  font-size: clamp(6px, 1.5vw, 9px);
  color: var(--pc98-cyan);
  text-align: center;
  max-width: 340px;
  line-height: 1.8;
  margin-top: 8px;
}

.title-menu {
  position: relative;
  z-index: 10;
  margin-top: 20px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.menu-btn {
  background: transparent;
  border: 2px solid var(--pc98-bright-cyan);
  color: var(--pc98-bright-white);
  font-family: 'Press Start 2P', monospace;
  font-size: clamp(9px, 2vw, 12px);
  padding: 10px 30px;
  cursor: pointer;
  text-align: center;
  transition: all 0.1s;
  min-width: 220px;
}

.menu-btn:hover, .menu-btn:active {
  background: var(--pc98-darkblue);
  border-color: var(--pc98-bright-magenta);
  color: var(--pc98-bright-yellow);
}

.blink-text {
  animation: blink 1.2s step-end infinite;
  font-size: clamp(7px, 1.5vw, 10px);
  color: var(--pc98-bright-green);
  margin-top: 15px;
  position: relative;
  z-index: 10;
}

@keyframes blink {
  0%, 50% { opacity: 1; }
  51%, 100% { opacity: 0; }
}

/* GAME SCREEN */
#game-screen {
  display: none;
  flex-direction: column;
  height: 100%;
  background: var(--pc98-black);
}

/* Top HUD bar */
.hud-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 4px 8px;
  background: var(--pc98-darkblue);
  border-bottom: 3px solid var(--pc98-blue);
  flex-shrink: 0;
  flex-wrap: wrap;
  gap: 2px;
}

.hud-stat {
  font-size: clamp(7px, 1.5vw, 9px);
  color: var(--pc98-bright-white);
  display: flex;
  align-items: center;
  gap: 4px;
}

.hud-label { color: var(--pc98-bright-cyan); }
.hud-val { color: var(--pc98-bright-yellow); }
.hud-val.danger { color: var(--pc98-bright-red); animation: blink 0.8s step-end infinite; }

.stat-bar {
  width: clamp(40px, 10vw, 70px);
  height: 8px;
  background: #111;
  border: 1px solid var(--pc98-white);
  position: relative;
  overflow: hidden;
}

.stat-bar-fill {
  height: 100%;
  transition: width 0.5s steps(10);
}

.fill-hp { background: var(--pc98-bright-green); }
.fill-money { background: var(--pc98-bright-yellow); }
.fill-soul { background: var(--pc98-bright-magenta); }
.fill-fame { background: var(--pc98-bright-cyan); }

/* Scene area */
.scene-area {
  flex: 1;
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

.scene-visual {
  flex: 1;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  min-height: 0;
}

/* Dithering background patterns */
.bg-apartment {
  background:
    repeating-linear-gradient(0deg, transparent 0px, transparent 3px, rgba(0,85,170,0.1) 3px, rgba(0,85,170,0.1) 4px),
    repeating-linear-gradient(90deg, transparent 0px, transparent 3px, rgba(0,85,170,0.08) 3px, rgba(0,85,170,0.08) 4px),
    linear-gradient(180deg, #111122 0%, #0a0a1a 100%);
}

.bg-gallery {
  background:
    repeating-linear-gradient(0deg, transparent 0px, transparent 5px, rgba(170,0,170,0.08) 5px, rgba(170,0,170,0.08) 6px),
    linear-gradient(180deg, #1a0a1a 0%, #0a0a0a 100%);
}

.bg-office {
  background:
    repeating-linear-gradient(45deg, transparent 0px, transparent 4px, rgba(170,170,0,0.06) 4px, rgba(170,170,0,0.06) 5px),
    linear-gradient(180deg, #1a1a0a 0%, #0a0a0a 100%);
}

.bg-studio {
  background:
    repeating-linear-gradient(90deg, transparent 0px, transparent 2px, rgba(0,170,170,0.1) 2px, rgba(0,170,170,0.1) 3px),
    linear-gradient(180deg, #0a1a1a 0%, #050a0a 100%);
}

.bg-street {
  background:
    repeating-linear-gradient(0deg, transparent 0px, transparent 6px, rgba(85,85,85,0.15) 6px, rgba(85,85,85,0.15) 7px),
    linear-gradient(180deg, #0d0d1a 0%, #050508 100%);
}

/* Scene objects rendered in CSS */
.scene-object {
  position: absolute;
  image-rendering: pixelated;
}

/* Character portrait */
.portrait-frame {
  position: absolute;
  bottom: 0;
  right: 5%;
  width: clamp(80px, 25vw, 160px);
  height: clamp(120px, 35vw, 220px);
  border: 3px solid var(--pc98-blue);
  background: linear-gradient(180deg, #111133 0%, #0a0a22 100%);
  display: flex;
  align-items: flex-end;
  justify-content: center;
  overflow: hidden;
  z-index: 5;
}

/* CSS Pixel art portrait of Miyö */
.miyo-portrait {
  width: 100%;
  height: 100%;
  position: relative;
}

/* Dialogue box */
.dialogue-box {
  background: rgba(0, 0, 30, 0.92);
  border-top: 3px solid var(--pc98-blue);
  border-bottom: 3px solid var(--pc98-blue);
  padding: 8px 12px;
  min-height: clamp(80px, 18vh, 120px);
  position: relative;
  flex-shrink: 0;
}

.dialogue-border-top {
  position: absolute;
  top: -1px;
  left: 0;
  right: 0;
  height: 1px;
  background: var(--pc98-bright-cyan);
}

.dialogue-speaker {
  font-size: clamp(8px, 1.8vw, 11px);
  color: var(--pc98-bright-magenta);
  margin-bottom: 4px;
  padding: 2px 8px;
  background: rgba(170, 0, 170, 0.15);
  display: inline-block;
  border: 1px solid var(--pc98-magenta);
}

.dialogue-text {
  font-size: clamp(8px, 1.8vw, 11px);
  color: var(--pc98-bright-white);
  line-height: 1.8;
  min-height: 2.5em;
}

.dialogue-text .typewriter {
  border-right: 2px solid var(--pc98-bright-white);
  animation: cursor-blink 0.6s step-end infinite;
}

@keyframes cursor-blink {
  0%, 50% { border-color: var(--pc98-bright-white); }
  51%, 100% { border-color: transparent; }
}

/* Choice buttons */
.choices-container {
  display: flex;
  flex-direction: column;
  gap: 4px;
  padding: 6px 12px;
  background: rgba(0, 0, 50, 0.95);
  border-top: 2px solid var(--pc98-blue);
  flex-shrink: 0;
}

.choice-btn {
  background: transparent;
  border: 2px solid var(--pc98-cyan);
  color: var(--pc98-bright-white);
  font-family: 'Press Start 2P', monospace;
  font-size: clamp(7px, 1.5vw, 10px);
  padding: 8px 12px;
  cursor: pointer;
  text-align: left;
  transition: all 0.1s;
  display: flex;
  align-items: center;
  gap: 8px;
}

.choice-btn:hover, .choice-btn:active {
  background: var(--pc98-darkblue);
  border-color: var(--pc98-bright-yellow);
  color: var(--pc98-bright-yellow);
}

.choice-arrow {
  color: var(--pc98-bright-cyan);
  flex-shrink: 0;
}

/* Bottom action bar (PC-98 style) */
.action-bar {
  display: flex;
  justify-content: space-around;
  padding: 4px;
  background: var(--pc98-darkblue);
  border-top: 2px solid var(--pc98-blue);
  flex-shrink: 0;
}

.action-btn {
  font-family: 'DotGothic16', monospace;
  font-size: clamp(8px, 1.8vw, 11px);
  color: var(--pc98-bright-white);
  background: none;
  border: 1px solid var(--pc98-blue);
  padding: 4px 10px;
  cursor: pointer;
}

.action-btn:hover, .action-btn:active {
  background: var(--pc98-blue);
  color: var(--pc98-bright-yellow);
}

/* MINI-GAME SCREENS */
.minigame-area {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 20;
  padding: 10px;
}

.minigame-title {
  font-size: clamp(10px, 2.5vw, 16px);
  color: var(--pc98-bright-yellow);
  text-align: center;
  margin-bottom: 10px;
  text-shadow: 2px 2px 0 var(--pc98-darkblue);
}

.minigame-instruction {
  font-size: clamp(7px, 1.5vw, 9px);
  color: var(--pc98-bright-cyan);
  text-align: center;
  margin-bottom: 12px;
  line-height: 1.6;
}

/* Typing minigame */
.typing-display {
  background: rgba(0,0,0,0.8);
  border: 2px solid var(--pc98-blue);
  padding: 10px;
  width: 90%;
  max-width: 500px;
  margin-bottom: 10px;
}

.typing-target {
  font-size: clamp(8px, 1.8vw, 11px);
  color: var(--pc98-white);
  line-height: 1.8;
  word-break: break-all;
}

.typing-target .correct { color: var(--pc98-bright-green); }
.typing-target .wrong { color: var(--pc98-bright-red); background: rgba(170,0,0,0.3); }
.typing-target .current { 
  color: var(--pc98-bright-white); 
  background: var(--pc98-blue);
  animation: blink 0.5s step-end infinite;
}

.typing-input {
  width: 90%;
  max-width: 500px;
  background: #000;
  border: 2px solid var(--pc98-cyan);
  color: var(--pc98-bright-green);
  font-family: 'Press Start 2P', monospace;
  font-size: clamp(9px, 2vw, 12px);
  padding: 8px;
  outline: none;
}

/* Timer bar */
.timer-container {
  width: 90%;
  max-width: 500px;
  margin-bottom: 8px;
}

.timer-label {
  font-size: clamp(7px, 1.3vw, 8px);
  color: var(--pc98-bright-red);
  margin-bottom: 2px;
}

.timer-bar {
  width: 100%;
  height: 10px;
  background: #111;
  border: 1px solid var(--pc98-white);
}

.timer-fill {
  height: 100%;
  background: var(--pc98-bright-red);
  transition: width 0.1s linear;
}

/* Button grid minigame */
.button-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
  width: 90%;
  max-width: 340px;
}

.grid-btn {
  background: rgba(0,0,50,0.8);
  border: 2px solid var(--pc98-blue);
  color: var(--pc98-bright-white);
  font-family: 'Press Start 2P', monospace;
  font-size: clamp(6px, 1.3vw, 8px);
  padding: 12px 4px;
  cursor: pointer;
  text-align: center;
  line-height: 1.4;
  transition: all 0.1s;
}

.grid-btn:hover, .grid-btn:active {
  background: var(--pc98-blue);
  border-color: var(--pc98-bright-yellow);
}

.grid-btn.correct {
  background: rgba(0,170,0,0.3);
  border-color: var(--pc98-bright-green);
  color: var(--pc98-bright-green);
}

.grid-btn.wrong {
  background: rgba(170,0,0,0.3);
  border-color: var(--pc98-bright-red);
  color: var(--pc98-bright-red);
}

/* Sequence minigame */
.sequence-display {
  display: flex;
  gap: 6px;
  margin-bottom: 12px;
  flex-wrap: wrap;
  justify-content: center;
}

.seq-step {
  width: clamp(36px, 9vw, 50px);
  height: clamp(36px, 9vw, 50px);
  border: 2px solid var(--pc98-blue);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: clamp(14px, 3vw, 22px);
  background: rgba(0,0,30,0.8);
  transition: all 0.2s;
}

.seq-step.active {
  border-color: var(--pc98-bright-yellow);
  background: rgba(170,170,0,0.2);
  transform: scale(1.1);
}

.seq-step.done {
  border-color: var(--pc98-bright-green);
  background: rgba(0,170,0,0.2);
}

.seq-step.failed {
  border-color: var(--pc98-bright-red);
  background: rgba(170,0,0,0.2);
}

/* Result overlay */
.result-overlay {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,20,0.95);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 30;
  padding: 20px;
}

.result-title {
  font-size: clamp(14px, 4vw, 24px);
  margin-bottom: 12px;
  text-align: center;
}

.result-title.success { color: var(--pc98-bright-green); }
.result-title.failure { color: var(--pc98-bright-red); }

.result-text {
  font-size: clamp(7px, 1.5vw, 10px);
  color: var(--pc98-bright-white);
  text-align: center;
  line-height: 2;
  margin-bottom: 15px;
  max-width: 400px;
}

.result-stats {
  font-size: clamp(7px, 1.5vw, 9px);
  color: var(--pc98-bright-cyan);
  text-align: center;
  line-height: 2;
  margin-bottom: 15px;
}

.continue-btn {
  background: transparent;
  border: 2px solid var(--pc98-bright-cyan);
  color: var(--pc98-bright-white);
  font-family: 'Press Start 2P', monospace;
  font-size: clamp(9px, 2vw, 12px);
  padding: 10px 24px;
  cursor: pointer;
}

.continue-btn:hover, .continue-btn:active {
  background: var(--pc98-darkblue);
  border-color: var(--pc98-bright-magenta);
  color: var(--pc98-bright-yellow);
}

/* GAME OVER / ENDING SCREEN */
#ending-screen {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  background: linear-gradient(180deg, #000 0%, #110022 50%, #000 100%);
  padding: 20px;
}

.ending-text {
  font-size: clamp(7px, 1.5vw, 10px);
  color: var(--pc98-bright-white);
  text-align: center;
  line-height: 2.2;
  max-width: 450px;
  margin-bottom: 20px;
}

/* Screen decorative borders (PC-98 style) */
.pc98-border-left,
.pc98-border-right {
  position: absolute;
  top: 0;
  bottom: 0;
  width: 4px;
  z-index: 50;
  pointer-events: none;
}

.pc98-border-left {
  left: 0;
  background: repeating-linear-gradient(180deg,
    var(--pc98-blue) 0px,
    var(--pc98-blue) 4px,
    var(--pc98-darkblue) 4px,
    var(--pc98-darkblue) 8px
  );
}

.pc98-border-right {
  right: 0;
  background: repeating-linear-gradient(180deg,
    var(--pc98-darkblue) 0px,
    var(--pc98-darkblue) 4px,
    var(--pc98-blue) 4px,
    var(--pc98-blue) 8px
  );
}

/* Level transition */
.level-transition {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: var(--pc98-black);
  z-index: 40;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.level-number {
  font-size: clamp(12px, 3vw, 20px);
  color: var(--pc98-bright-yellow);
  margin-bottom: 8px;
}

.level-name {
  font-size: clamp(10px, 2.5vw, 16px);
  color: var(--pc98-bright-magenta);
  margin-bottom: 6px;
  text-align: center;
}

.level-flavor {
  font-size: clamp(7px, 1.5vw, 9px);
  color: var(--pc98-cyan);
  text-align: center;
  line-height: 1.8;
  max-width: 350px;
  font-style: italic;
}

/* Responsive */
@media (max-width: 480px) {
  .hud-bar { padding: 3px 5px; gap: 1px; }
  .dialogue-box { padding: 6px 8px; min-height: 70px; }
  .choice-btn { padding: 6px 8px; }
}

/* Mobile tap feedback */
.tap-flash {
  animation: flash 0.15s;
}

@keyframes flash {
  0% { filter: brightness(2); }
  100% { filter: brightness(1); }
}

/* scene decorations */
.dither-overlay {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none;
  opacity: 0.06;
  background-image:
    repeating-linear-gradient(0deg, #fff 0px, #fff 1px, transparent 1px, transparent 2px),
    repeating-linear-gradient(90deg, #fff 0px, #fff 1px, transparent 1px, transparent 2px);
}

/* CSS pixel art objects */
.desk {
  position: absolute;
  bottom: 10%;
  left: 10%;
  width: 60%;
  height: 20%;
  background: linear-gradient(180deg, #664422 0%, #442211 100%);
  border: 2px solid #553311;
}

.laptop {
  position: absolute;
  bottom: 28%;
  left: 20%;
  width: 25%;
  height: 18%;
  background: #333;
  border: 2px solid #555;
}

.laptop-screen {
  width: 90%;
  height: 70%;
  margin: 4% auto;
  background: #001133;
  border: 1px solid #0055aa;
}

.coffee {
  position: absolute;
  bottom: 30%;
  right: 25%;
  width: 8%;
  height: 10%;
  background: #ddd;
  border-radius: 0 0 50% 50%;
  border: 2px solid #aaa;
}

.window-bg {
  position: absolute;

function initStars() {
  const c = document.getElementById('stars');
  for (let i = 0; i < 60; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.left = Math.random() * 100 + '%';
    s.style.top = Math.random() * 100 + '%';
    s.style.animationDelay = (Math.random() * 2) + 's';
    s.style.width = s.style.height = (Math.random() > 0.7 ? 3 : 2) + 'px';
    c.appendChild(s);
  }
}

function updateHUD() {
  document.getElementById('hp-val').textContent = Math.max(0, STATE.hp);
  document.getElementById('hp-bar').style.width = Math.max(0, STATE.hp) + '%';
  document.getElementById('money-val').textContent = '€' + STATE.money;
  document.getElementById('soul-bar').style.width = Math.max(0, Math.min(100, STATE.soul)) + '%';
  document.getElementById('level-val').textContent = STATE.level + 1;

  const moneyEl = document.getElementById('money-val');
  moneyEl.classList.toggle('danger', STATE.money < 0);
  const hpEl = document.getElementById('hp-val');
  hpEl.classList.toggle('danger', STATE.hp <= 20);
}

function showLevelTransition(levelIdx) {
  if (levelIdx >= LEVELS.length) {
    showEnding();
    return;
  }

  stopSong();
  STATE.level = levelIdx;
  const level = LEVELS[levelIdx];
  const area = document.getElementById('scene-area');

  area.innerHTML = `
    <div class="level-transition">
      <div class="level-number">— LEVEL ${levelIdx + 1} / ${LEVELS.length} —</div>
      <div class="level-name">${level.name}</div>
      <div class="level-flavor">${level.flavor}</div>
      <br>
      <button class="continue-btn" onclick="startLevel(${levelIdx})">▶ BEGIN</button>
    </div>
  `;
  updateHUD();
}

function startLevel(levelIdx) {
  const level = LEVELS[levelIdx];
  showDialogueScene(level, () => {
    startMinigame(level);
  });
}

function buildSceneHTML(level) {
  let sceneObjects = '';
  const s = level.scene;

  if (s === 'apartment' || s === 'apartment_night') {
    sceneObjects = `
      <div class="desk"></div>
      <div class="laptop"><div class="laptop-screen"></div></div>
      <div class="coffee"></div>
      <div class="window-bg"></div>
    `;
  } else if (s === 'gallery' || s === 'ars') {
    sceneObjects = `
      <div class="gallery-floor"></div>
      <div class="painting painting-1"></div>
      <div class="painting painting-2"></div>
      <div class="painting painting-3"></div>
    `;
  } else if (s === 'classroom') {
    sceneObjects = `
      <div class="office-desk"></div>
      <canvas id="classroom-canvas" style="position:absolute;top:0;left:0;width:100%;height:100%;image-rendering:pixelated;" width="640" height="300"></canvas>

// ─── Classroom scene with 5 girl students ───
function drawClassroom(canvas) {
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  const W = canvas.width;
  const H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  // Background - classroom wall
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0, 0, W, H);

  // Floor
  ctx.fillStyle = '#2a1a0e';
  ctx.fillRect(0, H * 0.7, W, H * 0.3);
  // Floor lines
  ctx.strokeStyle = '#3a2a1e';
  ctx.lineWidth = 1;
  for (let i = 0; i < 8; i++) {
    ctx.beginPath();
    ctx.moveTo(i * W / 7, H * 0.7);
    ctx.lineTo(i * W / 8 + W * 0.05, H);
    ctx.stroke();
  }

  // Whiteboard
  ctx.fillStyle = '#ddddcc';
  ctx.fillRect(W * 0.05, H * 0.05, W * 0.35, H * 0.35);
  ctx.strokeStyle = '#888877';
  ctx.lineWidth = 3;
  ctx.strokeRect(W * 0.05, H * 0.05, W * 0.35, H * 0.35);
  // Whiteboard content - Unity viewport sketch
  ctx.fillStyle = '#445566';
  ctx.fillRect(W * 0.08, H * 0.09, W * 0.12, H * 0.08);
  ctx.fillStyle = '#556677';
  ctx.fillRect(W * 0.22, H * 0.09, W * 0.15, H * 0.18);
  // "NavMesh" text scribble
  ctx.fillStyle = '#335577';
  ctx.fillRect(W * 0.08, H * 0.22, W * 0.1, H * 0.02);
  ctx.fillRect(W * 0.08, H * 0.26, W * 0.14, H * 0.02);
  ctx.fillRect(W * 0.08, H * 0.30, W * 0.08, H * 0.02);
  // Small 3D cube doodle
  ctx.fillStyle = '#00aaaa';
  ctx.fillRect(W * 0.28, H * 0.30, W * 0.04, H * 0.06);
  ctx.fillStyle = '#008888';
  ctx.fillRect(W * 0.30, H * 0.28, W * 0.04, H * 0.06);

  // Projector screen glow
  ctx.fillStyle = 'rgba(85, 170, 255, 0.04)';
  ctx.fillRect(W * 0.03, H * 0.02, W * 0.39, H * 0.42);

  // ─── Miyö at the front (standing, small, left side) ───
  const mx = W * 0.42;
  const my = H * 0.28;
  // Hair
  ctx.fillStyle = '#5599ff';
  ctx.fillRect(mx, my, 18, 6);
  ctx.fillRect(mx - 2, my + 6, 22, 4);
  ctx.fillRect(mx - 3, my + 10, 6, 16); // left strand
  ctx.fillRect(mx + 19, my + 10, 6, 16); // right strand
  // Face
  ctx.fillStyle = '#ffaa88';
  ctx.fillRect(mx + 3, my + 10, 16, 14);
  // Eyes
  ctx.fillStyle = '#fff';
  ctx.fillRect(mx + 5, my + 14, 4, 3);
  ctx.fillRect(mx + 13, my + 14, 4, 3);
  ctx.fillStyle = '#334';
  ctx.fillRect(mx + 7, my + 15, 2, 2);
  ctx.fillRect(mx + 15, my + 15, 2, 2);
  // Mouth
  ctx.fillStyle = '#cc6655';
  ctx.fillRect(mx + 8, my + 21, 6, 1);
  // Body - black shirt
  ctx.fillStyle = '#111';
  ctx.fillRect(mx + 1, my + 25, 20, 18);
  ctx.fillStyle = '#aa00aa';
  ctx.fillRect(mx + 6, my + 26, 10, 2); // magenta collar
  // Arms (one pointing at board)
  ctx.fillStyle = '#111';
  ctx.fillRect(mx - 6, my + 26, 7, 4);
  ctx.fillRect(mx - 10, my + 25, 5, 3);
  ctx.fillStyle = '#ffaa88';
  ctx.fillRect(mx - 13, my + 25, 4, 3); // pointing hand
  ctx.fillRect(mx + 21, my + 30, 4, 6);
  // Skirt
  ctx.fillStyle = '#222244';
  ctx.fillRect(mx + 2, my + 43, 18, 10);
  // Legs
  ctx.fillStyle = '#ffaa88';
  ctx.fillRect(mx + 4, my + 53, 5, 10);
  ctx.fillRect(mx + 13, my + 53, 5, 10);
  // Shoes
  ctx.fillStyle = '#333';
  ctx.fillRect(mx + 3, my + 62, 7, 3);
  ctx.fillRect(mx + 12, my + 62, 7, 3);

  // ─── 5 Girl students at desks (back row) ───
  const students = [
    { x: W * 0.05, hair: '#cc4488', hairStyle: 'long', skin: '#ffe0cc', top: '#4444aa', acc: null },
    { x: W * 0.20, hair: '#222222', hairStyle: 'short', skin: '#c68642', top: '#aa3366', acc: 'glasses' },
    { x: W * 0.37, hair: '#ffaa44', hairStyle: 'ponytail', skin: '#ffddbb', top: '#338844', acc: null },
    { x: W * 0.54, hair: '#884422', hairStyle: 'long', skin: '#deb887', top: '#6644aa', acc: 'earrings' },
    { x: W * 0.72, hair: '#ee5577', hairStyle: 'short', skin: '#ffd4b8', top: '#cc6633', acc: 'glasses' },
  ];

  students.forEach((s, i) => {
    const sx = s.x;
    const sy = H * 0.48;
    const dw = W * 0.14;
    const dh = H * 0.12;

    // Desk
    ctx.fillStyle = '#6b5b4a';
    ctx.fillRect(sx, sy + 28, dw, dh);
    ctx.fillStyle = '#7d6b5a';
    ctx.fillRect(sx, sy + 28, dw, 3);
    // Laptop on desk
    ctx.fillStyle = '#444';
    ctx.fillRect(sx + dw * 0.2, sy + 20, dw * 0.5, 10);
    ctx.fillStyle = '#001133';
    ctx.fillRect(sx + dw * 0.22, sy + 21, dw * 0.46, 7);
    // Screen glow
    ctx.fillStyle = '#003366';
    ctx.fillRect(sx + dw * 0.25, sy + 22, dw * 0.4, 5);

    // Student body (sitting)
    // Hair
    ctx.fillStyle = s.hair;
    if (s.hairStyle === 'long') {
      ctx.fillRect(sx + dw * 0.3, sy - 18, 20, 8);
      ctx.fillRect(sx + dw * 0.25, sy - 10, 26, 6);
      ctx.fillRect(sx + dw * 0.22, sy - 4, 8, 18); // left strand
      ctx.fillRect(sx + dw * 0.55, sy - 4, 8, 18); // right strand
    } else if (s.hairStyle === 'short') {
      ctx.fillRect(sx + dw * 0.3, sy - 16, 22, 10);
      ctx.fillRect(sx + dw * 0.28, sy - 6, 26, 4);
    } else if (s.hairStyle === 'ponytail') {
      ctx.fillRect(sx + dw * 0.3, sy - 18, 20, 8);
      ctx.fillRect(sx + dw * 0.25, sy - 10, 26, 6);
      // Ponytail to the side
      ctx.fillRect(sx + dw * 0.58, sy - 14, 6, 4);
      ctx.fillRect(sx + dw * 0.62, sy - 10, 5, 10);
      ctx.fillRect(sx + dw * 0.60, sy, 4, 8);
    }

    // Face
    ctx.fillStyle = s.skin;
    ctx.fillRect(sx + dw * 0.32, sy - 4, 18, 16);

    // Eyes
    ctx.fillStyle = '#fff';
    ctx.fillRect(sx + dw * 0.34, sy + 2, 5, 4);
    ctx.fillRect(sx + dw * 0.46, sy + 2, 5, 4);
    ctx.fillStyle = '#333';
    ctx.fillRect(sx + dw * 0.36, sy + 3, 3, 3);
    ctx.fillRect(sx + dw * 0.48, sy + 3, 3, 3);
    // Eye direction - looking at the board (left/up)
    ctx.fillStyle = '#111';
    ctx.fillRect(sx + dw * 0.36, sy + 3, 2, 2);
    ctx.fillRect(sx + dw * 0.48, sy + 3, 2, 2);

    // Glasses
    if (s.acc === 'glasses') {
      ctx.strokeStyle = '#888';
      ctx.lineWidth = 1;
      ctx.strokeRect(sx + dw * 0.33, sy + 1, 7, 6);
      ctx.strokeRect(sx + dw * 0.45, sy + 1, 7, 6);
      ctx.beginPath();
      ctx.moveTo(sx + dw * 0.40, sy + 4);
      ctx.lineTo(sx + dw * 0.45, sy + 4);
      ctx.stroke();
    }

    // Earrings
    if (s.acc === 'earrings') {
      ctx.fillStyle = '#ffcc00';
      ctx.fillRect(sx + dw * 0.30, sy + 8, 2, 3);
      ctx.fillRect(sx + dw * 0.52, sy + 8, 2, 3);
    }

    // Mouth
    ctx.fillStyle = '#cc8877';
    ctx.fillRect(sx + dw * 0.38, sy + 9, 6, 1);

    // Body/top
    ctx.fillStyle = s.top;
    ctx.fillRect(sx + dw * 0.28, sy + 13, 26, 14);

    // Arms on desk
    ctx.fillStyle = s.skin;
    ctx.fillRect(sx + dw * 0.24, sy + 18, 8, 6);
    ctx.fillRect(sx + dw * 0.52, sy + 18, 8, 6);
  });

  // Dithering overlay on the whole scene
  ctx.fillStyle = 'rgba(0,85,170,0.03)';
  for (let y = 0; y < H; y += 4) {
    ctx.fillRect(0, y, W, 1);
  }
}

let typewriterInterval = null;
function typewriterEffect(text, elementId, onComplete) {
  if (typewriterInterval) clearInterval(typewriterInterval);
  const el = document.getElementById(elementId);
  if (!el) return;
  let i = 0;
  el.innerHTML = '<span class="typewriter"></span>';

  typewriterInterval = setInterval(() => {
    if (i < text.length) {
      el.innerHTML = text.substring(0, i + 1) + '<span class="typewriter"></span>';
      i++;
    } else {
      clearInterval(typewriterInterval);
      typewriterInterval = null;
      el.innerHTML = text;
      if (onComplete) onComplete();
    }
  }, 28);

  // Tap to skip
  el.onclick = () => {
    if (typewriterInterval) {
      clearInterval(typewriterInterval);
      typewriterInterval = null;
      el.innerHTML = text;
      el.onclick = null;
      if (onComplete) onComplete();
    }
  };
}

function startMinigame(level) {
  playSong('gameplay');
  if (currentMinigameCleanup) {
    currentMinigameCleanup();
    currentMinigameCleanup = null;
  }

  switch (level.game) {
    case 'typing': startTypingGame(level); break;
    case 'sequence': startSequenceGame(level); break;
    case 'choices_rapid': startChoicesGame(level); break;
    case 'negotiation': startNegotiationGame(level); break;
  }
}

// ─── TYPING MINIGAME ───
function startTypingGame(level) {
  const gd = level.gameData;
  const area = document.getElementById('scene-area');
  let words = [...gd.words].sort(() => Math.random() - 0.5);
  let currentWordIdx = 0;
  let score = 0;
  let timeLeft = gd.timeLimit;
  let gameActive = true;

  function renderTypingGame() {
    area.innerHTML = `
      <div class="minigame-area ${level.bg}">
        <div class="dither-overlay"></div>
        <div class="minigame-title">${gd.title}</div>
        <div class="minigame-instruction">${gd.instruction}</div>
        <div class="timer-container">
          <div class="timer-label">TIME: <span id="time-display">${timeLeft}s</span></div>
          <div class="timer-bar"><div class="timer-fill" id="timer-fill" style="width:100%"></div></div>
        </div>
        <div class="typing-display">
          <div style="font-size:clamp(7px,1.3vw,8px);color:var(--pc98-bright-cyan);margin-bottom:6px;">
            SCORE: <span id="type-score">${score}</span> / ${words.length}
          </div>
          <div class="typing-target" id="typing-target"></div>
        </div>
        <div id="mobile-word-buttons" class="button-grid" style="margin-top:8px;"></div>
      </div>
    `;
    showCurrentWord();
    showWordButtons();
  }

  function showCurrentWord() {
    const target = document.getElementById('typing-target');
    if (!target || currentWordIdx >= words.length) return;
    target.innerHTML = `Type: <span style="color:var(--pc98-bright-yellow);font-size:clamp(10px,2.5vw,16px);">${words[currentWordIdx]}</span>`;
  }

  function showWordButtons() {
    const container = document.getElementById('mobile-word-buttons');
    if (!container) return;
    // Show 6 buttons: the correct word + 5 random decoys
    let options = [words[currentWordIdx]];
    const allDecoys = ['synergy', 'disruption', 'leverage', 'paradigm', 'stakeholder',
      'optimize', 'scalable', 'agile', 'bandwidth', 'ecosystem',
      'holistic', 'granular', 'alignment', 'deliverable', 'metric'];
    const decoys = allDecoys.filter(d => d !== words[currentWordIdx]).sort(() => Math.random() - 0.5).slice(0, 5);
    options = [...options, ...decoys].sort(() => Math.random() - 0.5);

    container.innerHTML = options.map(w =>
      `<button class="grid-btn" onclick="window._typeWord('${w}')">${w}</button>`
    ).join('');
  }

  window._typeWord = function(word) {
    if (!gameActive) return;
    const btns = document.querySelectorAll('.grid-btn');

    if (word === words[currentWordIdx]) {
      score++;
      playSFX('correct');
      btns.forEach(b => { if (b.textContent === word) b.classList.add('correct'); });
      document.getElementById('type-score').textContent = score;
      currentWordIdx++;
      if (currentWordIdx >= words.length) {
        endTypingGame(true);
        return;
      }
      setTimeout(() => {
        showCurrentWord();
        showWordButtons();
      }, 300);
    } else {
      playSFX('wrong');
      btns.forEach(b => { if (b.textContent === word) b.classList.add('wrong'); });
    }
  };

  // Timer
  const timer = setInterval(() => {
    if (!gameActive) return;
    timeLeft--;
    const td = document.getElementById('time-display');
    const tf = document.getElementById('timer-fill');
    if (td) td.textContent = timeLeft + 's';
    if (tf) tf.style.width = (timeLeft / gd.timeLimit * 100) + '%';
    if (timeLeft <= 0) {
      endTypingGame(score >= words.length * 0.5);
    }
  }, 1000);

  function endTypingGame(success) {
    gameActive = false;
    clearInterval(timer);
    showResult(level, success, `Words typed: ${score} / ${words.length}`);
  }

  currentMinigameCleanup = () => {
    gameActive = false;
    clearInterval(timer);
    window._typeWord = null;
  };

  renderTypingGame();
}

// ─── SEQUENCE MINIGAME ───
function startSequenceGame(level) {
  const gd = level.gameData;
  const area = document.getElementById('scene-area');
  const steps = gd.steps;
  let currentStep = 0;
  let shuffled = [...steps].map((s, i) => ({ ...s, origIdx: i })).sort(() => Math.random() - 0.5);
  let gameActive = true;
  let mistakes = 0;

  function render() {
    area.innerHTML = `
      <div class="minigame-area ${level.bg}">
        <div class="dither-overlay"></div>
        <div class="minigame-title">${gd.title}</div>
        <div class="minigame-instruction">${gd.instruction}</div>
        <div class="sequence-display" id="seq-display">
          ${steps.map((s, i) => `
            <div class="seq-step" id="seq-${i}" data-idx="${i}">
              ${i < currentStep ? s.icon : '?'}
            </div>
          `).join('')}
        </div>
        <div style="font-size:clamp(7px,1.3vw,8px);color:var(--pc98-bright-cyan);margin-bottom:8px;">
          Step ${currentStep + 1}: What comes next?
        </div>
        <div class="button-grid" id="seq-buttons"></div>
        <div style="font-size:clamp(6px,1.2vw,8px);color:var(--pc98-bright-red);margin-top:8px;" id="seq-mistakes">
          Mistakes: ${mistakes}/3
        </div>
      </div>
    `;

    // Show remaining options as buttons
    const remaining = shuffled.filter(s => s.origIdx >= currentStep);
    const btnContainer = document.getElementById('seq-buttons');
    btnContainer.innerHTML = remaining.map(s =>
      `<button class="grid-btn" onclick="window._seqPick(${s.origIdx})">${s.icon}<br><span style="font-size:clamp(5px,1vw,7px)">${s.label}</span></button>`
    ).join('');
  }

  window._seqPick = function(idx) {
    if (!gameActive) return;
    if (idx === currentStep) {
      // Correct
      playSFX('correct');
      const el = document.getElementById('seq-' + currentStep);
      if (el) { el.classList.add('done'); el.textContent = steps[currentStep].icon; }
      currentStep++;
      if (currentStep >= steps.length) {
        gameActive = false;
        showResult(level, mistakes < 3, `Completed with ${mistakes} mistake(s)`);
        return;
      }
      render();
    } else {
      mistakes++;
      playSFX('wrong');
      if (mistakes >= 3) {
        gameActive = false;
        showResult(level, false, `Too many mistakes (${mistakes}/3)`);
        return;
      }
      const el = document.getElementById('seq-' + idx);
      if (el) el.classList.add('failed');
      document.getElementById('seq-mistakes').textContent = `Mistakes: ${mistakes}/3`;
      setTimeout(() => { if (el) el.classList.remove('failed'); }, 500);
    }
  };

  currentMinigameCleanup = () => { gameActive = false; window._seqPick = null; };
  render();
}

// ═══════════════════════════════════════
//  PC-98 FM SYNTHESIS AUDIO ENGINE
//  YM2608-inspired Web Audio API synth
// ═══════════════════════════════════════

const AUDIO = {
  ctx: null,
  master: null,
  compressor: null,
  currentTrack: null,
  isPlaying: false,
  bpm: 140,
  stepTime: 0,
  schedulerTimer: null,
  nextNoteTime: 0,
  currentStep: 0,
  muted: false,
  initialized: false,
};

function initAudio() {
  if (AUDIO.initialized) return;
  try {
    AUDIO.ctx = new (window.AudioContext || window.webkitAudioContext)();
    
    // Master compressor for that crunchy PC-98 feel
    AUDIO.compressor = AUDIO.ctx.createDynamicsCompressor();
    AUDIO.compressor.threshold.value = -20;
    AUDIO.compressor.knee.value = 10;
    AUDIO.compressor.ratio.value = 8;
    AUDIO.compressor.attack.value = 0.003;
    AUDIO.compressor.release.value = 0.1;
    
    // Master gain
    AUDIO.master = AUDIO.ctx.createGain();
    AUDIO.master.gain.value = 0.35;
    
    // Bit-crusher-like effect via waveshaper for retro crunch
    const bitcrush = AUDIO.ctx.createWaveShaper();
    const n = 512;
    const curve = new Float32Array(n);
    const steps = 32; // quantize to fewer levels
    for (let i = 0; i < n; i++) {
      const x = (i * 2) / n - 1;
      curve[i] = Math.round(x * steps) / steps;
    }
    bitcrush.curve = curve;
    bitcrush.oversample = 'none';
    
    AUDIO.master.connect(bitcrush);
    bitcrush.connect(AUDIO.compressor);
    AUDIO.compressor.connect(AUDIO.ctx.destination);
    
    AUDIO.initialized = true;
  } catch(e) {
    console.warn('Audio init failed:', e);
  }
}

// ─── FM Synthesis Voice ───
// Emulates a 2-operator FM voice like the YM2608
function createFMVoice(freq, opts = {}) {
  if (!AUDIO.ctx) return null;
  const ctx = AUDIO.ctx;
  const now = ctx.currentTime;
  
  const {
    modRatio = 2,      // frequency ratio of modulator to carrier
    modIndex = 3,       // modulation depth
    attack = 0.01,
    decay = 0.15,
    sustain = 0.4,
    release = 0.2,
    duration = 0.3,
    waveform = 'sine',  // carrier waveform
    modWave = 'sine',   // modulator waveform
    volume = 0.3,
    detune = 0,
    vibrato = 0,
    vibratoRate = 5,
    feedback = 0,
  } = opts;
  
  // Modulator oscillator
  const mod = ctx.createOscillator();
  mod.type = modWave;
  mod.frequency.value = freq * modRatio;
  if (detune) mod.detune.value = detune;
  
  // Modulation depth gain
  const modGain = ctx.createGain();
  modGain.gain.value = freq * modIndex;
  
  // Carrier oscillator
  const carrier = ctx.createOscillator();
  carrier.type = waveform;
  carrier.frequency.value = freq;
  
  // Output envelope
  const env = ctx.createGain();
  env.gain.value = 0;
  
  // ADSR envelope (with safety clamping)
  const startTime = now;
  const envAttackEnd = startTime + attack;
  const envDecayEnd = envAttackEnd + decay;
  const envReleaseStart = Math.max(envDecayEnd + 0.01, startTime + duration - release);
  const envEnd = startTime + duration;
  
  env.gain.setValueAtTime(0, startTime);
  env.gain.linearRampToValueAtTime(volume, envAttackEnd);
  env.gain.linearRampToValueAtTime(volume * sustain, envDecayEnd);
  if (envReleaseStart > envDecayEnd) {
    env.gain.setValueAtTime(volume * sustain, envReleaseStart);
  }
  env.gain.linearRampToValueAtTime(0.001, envEnd);
  
  // Vibrato LFO (characteristic of PC-98 lead sounds)
  if (vibrato > 0) {
    const lfo = ctx.createOscillator();
    const lfoGain = ctx.createGain();
    lfo.frequency.value = vibratoRate;
    lfoGain.gain.value = vibrato;
    lfo.connect(lfoGain);
    lfoGain.connect(carrier.frequency);
    lfo.start(startTime);
    lfo.stop(startTime + duration + 0.1);
  }
  
  // Connect: mod -> modGain -> carrier.frequency
  mod.connect(modGain);
  modGain.connect(carrier.frequency);
  
  // Connect: carrier -> envelope -> master
  carrier.connect(env);
  env.connect(AUDIO.master);
  
  // Start and stop
  mod.start(startTime);
  carrier.start(startTime);
  mod.stop(startTime + duration + 0.1);
  carrier.stop(startTime + duration + 0.1);
  
  return { carrier, mod, env };
}

// ─── SSG (Square/Pulse) Voice ───
// Emulates the YM2149/SSG channels
function createSSGVoice(freq, opts = {}) {
  if (!AUDIO.ctx) return null;
  const ctx = AUDIO.ctx;
  const now = ctx.currentTime;
  
  const {
    duty = 'square',    // square, sawtooth, triangle
    attack = 0.005,
    decay = 0.1,
    sustain = 0.3,
    release = 0.1,
    duration = 0.2,
    volume = 0.15,
  } = opts;
  
  const osc = ctx.createOscillator();
  osc.type = duty;
  osc.frequency.value = freq;
  
  const env = ctx.createGain();
  env.gain.value = 0;
  
  const startTime = now;
  const envAttackEnd = startTime + attack;
  const envDecayEnd = envAttackEnd + decay;
  const envReleaseStart = Math.max(envDecayEnd + 0.001, startTime + duration - release);
  const envEnd = startTime + duration;
  
  env.gain.setValueAtTime(0, startTime);
  env.gain.linearRampToValueAtTime(volume, envAttackEnd);
  env.gain.linearRampToValueAtTime(volume * sustain, envDecayEnd);
  if (envReleaseStart > envDecayEnd) {
    env.gain.setValueAtTime(volume * sustain, envReleaseStart);
  }
  env.gain.linearRampToValueAtTime(0.001, envEnd);
  
  osc.connect(env);
  env.connect(AUDIO.master);
  
  osc.start(startTime);
  osc.stop(startTime + duration + 0.1);
  
  return { osc, env };
}

// ─── Noise / Percussion Voice ───
function createNoiseHit(opts = {}) {
  if (!AUDIO.ctx) return null;
  const ctx = AUDIO.ctx;
  const now = ctx.currentTime;
  
  const {
    type = 'hihat',  // hihat, snare, kick, crash
    volume = 0.2,
    duration = 0.1,
  } = opts;
  
  if (type === 'kick') {
    // FM kick drum
    const osc = ctx.createOscillator();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(150, now);
    osc.frequency.exponentialRampToValueAtTime(30, now + 0.15);
    
    const env = ctx.createGain();
    env.gain.setValueAtTime(volume * 1.5, now);
    env.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
    
    osc.connect(env);
    env.connect(AUDIO.master);
    osc.start(now);
    osc.stop(now + 0.35);
    return;
  }
  
  if (type === 'snare') {
    // Noise + tone body
    const bufSize = AUDIO.ctx.sampleRate * 0.15;
    const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) {
      data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufSize, 3);
    }
    const noise = ctx.createBufferSource();
    noise.buffer = buf;
    
    const noiseGain = ctx.createGain();
    noiseGain.gain.setValueAtTime(volume, now);
    noiseGain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
    
    // Tone body
    const body = ctx.createOscillator();
    body.type = 'triangle';
    body.frequency.setValueAtTime(180, now);
    body.frequency.exponentialRampToValueAtTime(60, now + 0.05);
    
    const bodyGain = ctx.createGain();
    bodyGain.gain.setValueAtTime(volume * 0.8, now);
    bodyGain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
    
    // Bandpass filter for that snappy SSG snare
    const filter = ctx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.value = 3000;
    filter.Q.value = 1.5;
    
    noise.connect(filter);
    filter.connect(noiseGain);
    noiseGain.connect(AUDIO.master);
    body.connect(bodyGain);
    bodyGain.connect(AUDIO.master);
    
    noise.start(now);
    body.start(now);
    body.stop(now + 0.1);
    return;
  }
  
  if (type === 'hihat' || type === 'crash') {
    const dur = type === 'crash' ? 0.4 : duration;
    const bufSize = AUDIO.ctx.sampleRate * dur;
    const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) {
      data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufSize, type === 'crash' ? 1.5 : 4);
    }
    const noise = ctx.createBufferSource();
    noise.buffer = buf;
    
    const env = ctx.createGain();
    env.gain.setValueAtTime(volume * (type === 'crash' ? 1.2 : 0.7), now);
    env.gain.exponentialRampToValueAtTime(0.001, now + dur);
    
    const hp = ctx.createBiquadFilter();
    hp.type = 'highpass';
    hp.frequency.value = type === 'crash' ? 4000 : 7000;
    
    noise.connect(hp);
    hp.connect(env);
    env.connect(AUDIO.master);
    noise.start(now);
    return;
  }
}

// ─── Note frequencies (correct MIDI mapping) ───
const NOTE = {};
const noteNames = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
for (let oct = 0; oct <= 8; oct++) {
  for (let n = 0; n < 12; n++) {
    const midi = (oct + 1) * 12 + n; // C4 = MIDI 60, A4 = MIDI 69 = 440Hz
    NOTE[noteNames[n] + oct] = 440 * Math.pow(2, (midi - 69) / 12);
  }
}

  // ═══ GAME OVER ═══
  gameover: {
    bpm: 70,
    loop: false,
    channels: [
      {
        type: 'fm',
        pattern: [
          ['E4',4,{modRatio:3,modIndex:6,volume:0.2,attack:0.2,decay:0.5,sustain:0.3,release:0.5,vibrato:2}],
          ['D4',4,{modRatio:3,modIndex:6,volume:0.18}],
          ['C4',4,{modRatio:3,modIndex:6,volume:0.16}],
          ['B3',8,{modRatio:4,modIndex:8,volume:0.2,vibrato:5,vibratoRate:3}],
          ['A3',8,{modRatio:3,modIndex:6,volume:0.15,vibrato:3}],
        ],
      },
      {
        type: 'drums',
        pattern: [
          [null,4],['kick',4],
          [null,4],['kick',4],
          [null,4],['kick',4],['kick',4],
          ['crash',8],[null,4],
        ],
      },
    ],
  },
};

// ─── Sequencer Engine ───
function playSong(songName) {
  if (AUDIO.muted) return;
  if (!AUDIO.initialized) initAudio();
  if (!AUDIO.ctx) return;
  
  // Resume audio context (needed for mobile)
  if (AUDIO.ctx.state === 'suspended') {
    AUDIO.ctx.resume().catch(() => {});
  }
  
  stopSong();
  
  const song = SONGS[songName];
  if (!song) return;
  
  AUDIO.currentTrack = songName;
  AUDIO.isPlaying = true;
  AUDIO.bpm = song.bpm;
  AUDIO.stepTime = 60 / AUDIO.bpm / 2; // each step = 1/8th note
  
  // Track position per channel
  const channelPos = song.channels.map(() => 0);
  const channelStepCountdown = song.channels.map(() => 0);
  
  let totalStep = 0;
  
  function scheduleStep() {
    if (!AUDIO.isPlaying) return;
    
    song.channels.forEach((ch, chIdx) => {
      if (channelStepCountdown[chIdx] > 0) {
        channelStepCountdown[chIdx]--;
        return;
      }
      
      const pattern = ch.pattern;
      if (channelPos[chIdx] >= pattern.length) {
        if (song.loop) {
          channelPos[chIdx] = 0;
        } else {
          return;
        }
      }
      
      const entry = pattern[channelPos[chIdx]];
      if (!entry) return;
      
      const note = entry[0];
      const steps = entry[1];
      const opts = entry[2] || {};
      
      const duration = steps * AUDIO.stepTime;
      
      if (note !== null) {
        if (ch.type === 'fm') {
          const freq = NOTE[note];
          if (freq) {
            createFMVoice(freq, { ...opts, duration: Math.min(duration * 0.9, duration - 0.02) });
          }
        } else if (ch.type === 'ssg') {
          const freq = NOTE[note];
          if (freq) {
            createSSGVoice(freq, { ...opts, duration: opts.duration || Math.min(duration * 0.8, duration - 0.02) });
          }
        } else if (ch.type === 'drums') {
          createNoiseHit({ type: note, volume: opts.volume || 0.2 });
        }
      }
      
      channelStepCountdown[chIdx] = steps - 1;
      channelPos[chIdx]++;
    });
    
    totalStep++;
    
    // Check if all channels are done (for non-looping songs)
    if (!song.loop) {
      const allDone = song.channels.every((ch, i) => channelPos[i] >= ch.pattern.length && channelStepCountdown[i] <= 0);
      if (allDone) {
        AUDIO.isPlaying = false;
        return;
      }
    }
  }
  
  AUDIO.schedulerTimer = setInterval(scheduleStep, AUDIO.stepTime * 1000);
}

function stopSong() {
  AUDIO.isPlaying = false;
  if (AUDIO.schedulerTimer) {
    clearInterval(AUDIO.schedulerTimer);
    AUDIO.schedulerTimer = null;
  }
  AUDIO.currentTrack = null;
}

function toggleMute() {
  AUDIO.muted = !AUDIO.muted;
  if (AUDIO.muted) {
    stopSong();
    if (AUDIO.master) AUDIO.master.gain.value = 0;
  } else {
    if (AUDIO.master) AUDIO.master.gain.value = 0.35;
  }
  updateMuteButton();
}

function updateMuteButton() {
  const btn = document.getElementById('mute-btn');
  if (btn) {
    btn.textContent = AUDIO.muted ? '🔇' : '🔊';
    btn.title = AUDIO.muted ? 'Unmute' : 'Mute';
  }
}

// ─── SFX ───
function playSFX(type) {
  if (AUDIO.muted) return;
  if (!AUDIO.initialized) initAudio();
  if (!AUDIO.ctx) return;
  if (AUDIO.ctx.state === 'suspended') AUDIO.ctx.resume().catch(() => {});
  
  switch(type) {
    case 'select':
      createFMVoice(NOTE['C6'], { modRatio: 2, modIndex: 4, volume: 0.15, duration: 0.08, attack: 0.005, decay: 0.03, sustain: 0.1, release: 0.02 });
      break;
    case 'confirm':
      createFMVoice(NOTE['E5'], { modRatio: 2, modIndex: 3, volume: 0.12, duration: 0.1, attack: 0.005 });
      setTimeout(() => createFMVoice(NOTE['G5'], { modRatio: 2, modIndex: 3, volume: 0.12, duration: 0.1, attack: 0.005 }), 60);
      setTimeout(() => createFMVoice(NOTE['C6'], { modRatio: 2, modIndex: 4, volume: 0.15, duration: 0.15, attack: 0.005 }), 120);
      break;
    case 'error':
      createFMVoice(NOTE['A3'], { modRatio: 5, modIndex: 8, volume: 0.15, duration: 0.15, attack: 0.005, decay: 0.1 });
      break;
    case 'correct':
      createFMVoice(NOTE['E6'], { modRatio: 2, modIndex: 3, volume: 0.1, duration: 0.1, attack: 0.005 });
      break;
    case 'wrong':
      createSSGVoice(NOTE['C3'], { duty: 'sawtooth', volume: 0.1, duration: 0.15 });
      break;
    case 'type':
      createSSGVoice(NOTE['C5'] + Math.random() * 200, { duty: 'square', volume: 0.04, duration: 0.03, attack: 0.002 });
      break;
  }
}

// ═══════════════════════════════════════
//  INIT
// ═══════════════════════════════════════
initStars();
drawTitleChar();

// Audio needs user gesture to start
let audioStarted = false;
function handleFirstInteraction() {
  if (audioStarted) return;
  audioStarted = true;
  initAudio();
  if (AUDIO.ctx && AUDIO.ctx.state === 'suspended') {
    AUDIO.ctx.resume().catch(() => {});
  }
  // Only play title if we're still on the title screen
  setTimeout(() => {
    const titleScreen = document.getElementById('title-screen');
    if (titleScreen && titleScreen.style.display !== 'none' && !AUDIO.isPlaying && !AUDIO.muted) {
      playSong('title');
    }
  }, 100);
}
document.addEventListener('click', handleFirstInteraction, { passive: true });
document.addEventListener('touchstart', handleFirstInteraction, { passive: true });
</script>
